name: Odoo CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout your module
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxml2-dev libxslt1-dev libpq-dev \
          build-essential git python3-dev \
          libsasl2-dev libldap2-dev libssl-dev \
          wkhtmltopdf

    - name: Clone Odoo 17 core
      run: |
        cd ..
        git clone --branch 17.0 --depth 1 https://github.com/odoo/odoo.git odoo-17
        cd odoo-17
        pip install -r requirements.txt

    - name: Create Odoo config file
      run: |
        cd ../odoo-17
        echo "[options]
        addons_path = ../odoo-17/addons, ${{ github.workspace }}
        db_host = localhost
        db_port = 5432
        db_user = odoo
        db_password = odoo
        " > odoo.conf

    - name: Run your tests
      env:
        PGHOST: localhost
        PGUSER: odoo
        PGPASSWORD: odoo
      run: |
        cd ../odoo-17
        python odoo-bin -c odoo.conf -d testdb -i foi_base_restriction --test-enable --stop-after-init --without-demo=all --log-level=info

    - name: Upload module artifact
      uses: actions/upload-artifact@v4
      with:
        name: foi_base_restriction
        path: ${{ github.workspace }}
        retention-days: 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Download module artifact
      uses: actions/download-artifact@v4
      with:
        name: foi_base_restriction
        path: ./foi_base_restriction

    - name: Deploy module to on-premises server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "./foi_base_restriction/*"
        target: ${{ secrets.SERVER_MODULE_PATH }}
        strip_components: 1

    - name: Update Odoo module and restart service
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Set correct ownership
          sudo chown -R testfssd:testfssd /home/testfssd/odoo17/custom_addons/foi_base_restriction
          
          # Update the module using the virtual environment's Python
          cd /home/testfssd/odoo17
          /home/testfssd/odoo17/venv/bin/python3 /home/testfssd/odoo17/odoo-bin -c /home/testfssd/odoo17/odoo.conf -u foi_base_restriction --stop-after-init
          
          # Restart the Odoo service
          sudo systemctl restart odoo17
          
          echo "✅ Deployment completed successfully!"